    <script>
      // Polyfill global for libraries that expect it
      if (typeof global === 'undefined') {
        window.global = window;
      }
      
      // Safeguard against libraries trying to override fetch if it's a read-only getter
      (function() {
        const descriptor = Object.getOwnPropertyDescriptor(window, 'fetch');
        if (descriptor && !descriptor.writable && !descriptor.set) {
          console.warn('window.fetch is read-only. Preventing potential override errors.');
          // We can't do much if it's read-only, but we can try to catch errors from libraries
          // that might try to assign to it.
        }
      })();
    </script>
