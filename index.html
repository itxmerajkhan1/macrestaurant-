    <script>
      // Polyfill global for libraries that expect it
      if (typeof global === 'undefined') {
        window.global = window;
      }
      
      // Safeguard against libraries trying to override fetch if it's a read-only getter
      (function() {
        try {
          const originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function(v) { 
              console.warn('Attempted to override window.fetch with:', v);
              // If we can't override it, we just ignore the assignment to prevent TypeError
            },
            configurable: true
          });
        } catch (e) {
          console.warn('window.fetch is read-only and not configurable. Preventing potential override errors.');
        }
      })();
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
